# CXI Update Skill Configuration
# Supports multiple audience profiles from the same core data sources

# Basic Team Info
team: CXI
timezone: America/Los_Angeles

# Profiles - each profile targets a different audience with the same core data
profiles:
  exec_biweekly:
    name: "Biweekly Executive Summary"
    schedule: biweekly
    audience: "VP Support, COO, SVP Eng"
    template_id: "1_Wqcl7rmWHME4vGkKiCLs-3BXIdYE7gH7wbxuzW27ys"
    markdown_template: "assets/templates/biweekly-template.md"
    style_section: "Executive Summary Writing Style Guidance"
    title_format: "CXI Executive Summary - {date}"
    slack_notification_channel: "#support-automation"
    reviewers:
      primary: kevin.baron@databricks.com
      secondary: samira.emmerson@databricks.com
      cc:
        - nilesh.bhide@databricks.com
        - manoj@databricks.com

  weekly_support:
    name: "Weekly Support"
    schedule: weekly
    audience: "Directors, TSE Managers, Shift Leads, Tech Leads, TSEs"
    # TODO: Create Google Doc template for weekly support and add template_id here
    template_id: ""
    markdown_template: "assets/templates/weekly-support-template.md"
    style_section: "Weekly Support Update Writing Style Guidance"
    title_format: "CXI Weekly Support Update - {date}"
    slack_notification_channel: "#support-automation"
    reviewers:
      primary: kevin.baron@databricks.com

# Data Sources Configuration
data_sources:
  # Google Calendar Configuration
  meetings:
    calendar_id: "kevin.baron@databricks.com"  # Using your primary Google Calendar
    # Meeting keywords to search for
    keywords:
      - "CXI Stand up"
      - "CXI Sprint Planning"
      - "CXI Sprint Review"
      - CXI
    days_back: 14  # How many days to look back for meetings

  # Gmail - Gemini Meeting Summaries
  gmail:
    # Gemini auto-generates meeting summary emails after CXI calls
    # These often land in Trash, so we use in:anywhere to search all folders
    query: "in:anywhere from:me subject:(notes of CXI) newer_than:14d"
    max_results: 20
    days_back: 14  # Match the biweekly cycle

  # JIRA Configuration
  jira:
    project_key: PLAT  # CXI project
    # JQL query for UC tickets
    custom_jql: "project = PLAT AND component = 'Support Platform' AND (status = 'In Progress' OR updated >= -14d) ORDER BY priority DESC"
    # Optional: Specific statuses to highlight
    highlight_statuses:
      - "To Do"
      - "In Progress"
      - "In Review"
      - "Done"
    # Optional: Priority levels to track
    track_priorities:
      - "Highest"
      - "High"
      - "Medium"

    # Roadmap-to-JIRA Mapping
    # Each Epic on the Support Platform board represents a product area.
    # Each Roadmap Objective maps to one of these product areas.
    # When building the exec biweekly, group JIRA tickets by their Epic,
    # then frame progress in terms of the corresponding Roadmap Objective.
    #
    # 👉 UPDATE this mapping when roadmap objectives or product areas change.
    roadmap_to_epic_mapping:
      # Roadmap Objective → JIRA Epic (product area)
      "Automatic Diagnostic Collection (DBSQL)": "Merlin"
      "Governed Execution Plane": "Support Tooling MCP"
      "Isaac Investigation Surface": "Support Agent"
      "Support Tooling Backend Service": "Support Tooling Service"

  # Slack Configuration
  slack:
    # Your team's Slack channels
    channels:
      - support-automation
      - support-agent-internal
      - eng-support-automation
      - allhands-support
    # Optional: Filter messages by emoji reactions
    # 👉 CUSTOMIZE which emojis indicate important updates
    reaction_filter:
      - heart-eng   # 🎉 Celebrations/launches
      - rocket      # 🚀 Shipped features
      - star        # ⭐ Important decisions
      - plus1        # 👀 Needs attention
    days_back: 14  # How many days to look back
    min_reactions: 2  # Minimum reactions to include message

# Output Configuration (shared across profiles)
output:
  format: google_doc  # Options: google_doc, email, markdown

  google_drive:
    # Shared folder for all CXI updates
    folder_id: "15N7jxMSBzLpqVb92TxxZbTneCQUm9-tD"
    # Per-profile template_id is in the profiles section above

  slack_notification:
    enabled: true
    # Per-profile channel is in the profiles section above
    message_template: "{profile_name} draft ready for review: {link}"

# Metrics Configuration
# 👉 CUSTOMIZE which metrics to track and display
metrics:
  # Delivery Metrics
  delivery:
    - name: "Sprint Points Completed"
      source: "jira"  # Where to get this metric
      jql_field: "Story Points"  # Custom field in JIRA
    - name: "Features Shipped"
      source: "jira"
      count_status: "Done"
    - name: "Bugs Closed"
      source: "jira"
      count_issuetype: "Bug"

  # Quality Metrics
  quality:
    - name: "P0 Incidents"
      source: "jira"
      count_priority: "Highest"
      count_issuetype: "Incident"
    - name: "API Uptime"
      source: "external"  # From monitoring dashboard
      dashboard_url: "https://grafana.example.com/dashboard"

  # Customer Metrics (if applicable)
  customer:
    - name: "Active Users"
      source: "dashboard"
      dashboard_url: "https://analytics.example.com"
    - name: "Support Tickets"
      source: "jira"
      project_key: "SUPPORT"

# Advanced Settings
advanced:
  # Automatically detect launches/milestones from JIRA
  auto_detect_launches:
    enabled: true
    # JIRA labels that indicate a launch
    launch_labels:
      - "GA"
      - "Private-Preview"
      - "Public-Preview"

  # Automatically detect blockers
  auto_detect_blockers:
    enabled: true
    # Issues with these labels/priorities are auto-flagged as blockers
    blocker_labels:
      - "blocker"
      - "escalation"
    blocker_priorities:
      - "Highest"

  # Content generation preferences
  content_generation:
    max_highlights: 4  # Maximum number of key highlights
    max_blockers: 3    # Maximum number of blockers to show
    include_metrics_trends: true  # Show ↑/↓ trends
    include_customer_quotes: false  # Pull from support tickets (experimental)

# Links Configuration
# 👉 UPDATE with your team's actual links
links:
  go_link: "go/cxi"  # Main team update link
  faq_link: "go/cxi"   # FAQ link
  dashboard_link: "https://dashboard.example.com/abac"  # Metrics dashboard
  roadmap_link: "https://databricks.atlassian.net/wiki/spaces/UN/embed/6081610365?atl_f=PAGETREE"      # Roadmap link
  feedback_email: "cxi-team@company.com"  # Team email for feedback

